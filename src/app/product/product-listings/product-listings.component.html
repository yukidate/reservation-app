<div class="container">
    <br>
    <div class="row">
        <div class="col-sm" *ngFor="let product of products; let productId = index">
            <a [routerLink]="[product._id]">
                <div class="card">
                    <img src="{{product.coverimage}}" class="card-img-top" alt="...">
                    <div class="card-body">
                        <p class="card-title">{{product.name}}</p>
                        <p class="card-text">{{product.description}}</p>
                    </div>
                </div>
            </a>
        </div>
</div>
